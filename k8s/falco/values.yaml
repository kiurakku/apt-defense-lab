# falcosecurity/falco chart 8.0.1
# helm install falco falcosecurity/falco -n falco --create-namespace --version 8.0.1 -f values.yaml
#
# Custom rules live in custom-rules.yaml (repo) and are embedded below under
# `customRules` so Helm renders the same content into /etc/falco/rules.d/.

driver:
  enabled: true
  kind: ebpf

falcosidekick:
  enabled: false

falco:
  grpc:
    enabled: true
    bind_address: "unix:///run/falco/falco.sock"
    threadiness: 0
  grpc_output:
    enabled: true

customRules:
  custom-rules.yaml: |
    - list: known_tmp_writers
      items: [apt, dpkg, rpm, pip, npm, yarn, tmpwatch]

    - list: known_network_tools
      items: [curl, wget, dig, nslookup, nc]

    - macro: apt_magic_filename
      condition: fd.name endswith apt-magic-staging.txt

    - rule: APT Malware TMP File Drop
      desc: Detects file creation in /tmp inside a container — known APT staging tactic
      condition: >
        spawned_process and container and
        (open_write) and
        fd.directory = "/tmp" and
        not proc.name in (known_tmp_writers)
      output: >
        Suspicious write to /tmp in container
        (user=%user.name container=%container.name image=%container.image.repository
         file=%fd.name proc=%proc.name cmdline=%proc.cmdline)
      priority: CRITICAL
      tags: [apt, malware, container]

    - rule: APT Magic Filename Staging
      desc: Specific magic file name dropped under /tmp (lab IOC)
      condition: >
        container and open_write and apt_magic_filename
      output: >
        APT magic file staging
        (user=%user.name container=%container.name file=%fd.name proc=%proc.name cmdline=%proc.cmdline)
      priority: CRITICAL
      tags: [apt, malware, container, ioc]

    - rule: Reverse Shell C2 Connection
      desc: Outbound TCP connection to common reverse shell destination ports from inside a container
      condition: >
        outbound and container and
        fd.dport in (4444, 4445, 1337, 31337) and
        not proc.name in (known_network_tools)
      output: >
        Possible reverse shell C2 connection
        (user=%user.name container=%container.name image=%container.image.repository
         connection=%fd.name proc=%proc.name dport=%fd.dport cmdline=%proc.cmdline)
      priority: CRITICAL
      tags: [apt, reverse-shell, c2, container]
