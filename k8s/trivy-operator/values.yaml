# aquasecurity/trivy-operator chart 0.32.1
# helm install trivy-operator aquasecurity/trivy-operator -n trivy-system --version 0.32.1 -f values.yaml
#
# Стиснення логів scan job (gzip у транспорті до Cloud Logging) у цьому chart
# задається НЕ випадковими ключами під "trivy:", а полем ConfigMap оператора:
#   data.scanJob.compressLogs: "true"
# Після встановлення виконайте (див. README):
#   bash scripts/configure_trivy_log_compression.sh

operator:
  vulnerabilityScannerEnabled: true
  scanJobsConcurrentLimit: 2

trivyOperator:
  vulnerabilityReportsPlugin: "Trivy"

trivy:
  ignoreUnfixed: false
  severity: "CRITICAL,HIGH,MEDIUM"

serviceAccount:
  create: true
  name: trivy-operator
  annotations:
    iam.gke.io/gcp-service-account: "trivy-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com"

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"
