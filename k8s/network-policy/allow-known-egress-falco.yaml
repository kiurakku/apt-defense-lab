# Falco: allow DNS + HTTPS (updates/telemetry as needed); tighten further per environment.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-known-egress-only
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
