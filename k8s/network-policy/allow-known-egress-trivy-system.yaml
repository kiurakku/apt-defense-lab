# Trivy operator needs HTTPS (registries, DB), DNS. C&C ports not listed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-known-egress-only
  namespace: trivy-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
