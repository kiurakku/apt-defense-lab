# -----------------------------------------------------------------------------
# Helm chart: falcosecurity/falco
# Pin versions (check before install):
#   helm repo add falcosecurity https://falcosecurity.github.io/charts
#   helm repo update
#   helm show chart falcosecurity/falco --version 8.0.1
# Install:
#   helm install falco falcosecurity/falco -n falco --create-namespace \
#     --version 8.0.1 -f values.yaml
#
# Chart 8.x maps Falco runtime config under `falco:` (falco.yaml).
# Custom rules use top-level `customRules` (map: filename -> rule file body).
# -----------------------------------------------------------------------------

driver:
  enabled: true
  # GKE Container-Optimized OS: eBPF probe is typical; use `modern_ebpf` on newer kernels if supported
  kind: ebpf

serviceAccount:
  create: true
  annotations: {}
  # TODO: Workload Identity for sidekick / exporters if needed

# Falco engine configuration (merged into falco.yaml)
falco:
  json_output: true
  json_include_output_property: true
  log_level: info

# Inline custom rules (same content as custom-rules.yaml for single-file Helm install)
customRules:
  rules-apt-lab.yaml: |
    - macro: SPECIFIC_PORT
      condition: (fd.sport = 4444 or fd.dport = 4444)

    - rule: APT tmp file drop
      desc: Detect writes under /tmp inside a container (lab APT “magic file” scenario)
      condition: >
        container and
        evt.type in (write, writev, rename, open, openat) and
        fd.name startswith /tmp
      output: "APT tmp file drop (user=%user.name container=%container.name proc=%proc.name file=%fd.name)"
      priority: CRITICAL
      tags: [container, filesystem, apt_lab]

    - rule: Reverse shell detected
      desc: Outbound connection on SPECIFIC_PORT (reverse shell / C&C lab)
      condition: >
        container and
        evt.type in (connect, accept) and
        SPECIFIC_PORT
      output: "Reverse shell / C&C port (container=%container.name proc=%proc.name fd=%fd.name dport=%fd.dport sport=%fd.sport)"
      priority: CRITICAL
      tags: [container, network, apt_lab]

    - rule: Container escape via privileged mount
      desc: Container process interacting with host device node mount (escape class)
      condition: >
        container and
        evt.type in (open, openat, mount) and
        (fd.name startswith /dev/ or fd.name contains "kubelet")
      output: "Privileged mount / device access (container=%container.name proc=%proc.name fd=%fd.name)"
      priority: CRITICAL
      tags: [container, escape, apt_lab]
