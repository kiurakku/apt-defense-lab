# -----------------------------------------------------------------------------
# Helm chart: aquasecurity/trivy-operator
# Upstream defaults: Chart.yaml version 0.32.1, appVersion 0.30.1 (verify with repo)
#   helm repo add aquasecurity https://aquasecurity.github.io/helm-charts/
#   helm repo update
#   helm show chart aquasecurity/trivy-operator --version 0.32.1
# Install:
#   kubectl apply -f namespace.yaml
#   helm install trivy-operator aquasecurity/trivy-operator -n trivy-system \
#     --version 0.32.1 -f values.yaml
#
# Vulnerability scanning is toggled under `operator` (not a top-level `trivyOperator` flag).
# Compression of scan job / report payloads: see `trivyOperator.scanJobCompressLogs` and
# operator source (pkg/compress) — JSON → gzip → base64 in CR annotations / ConfigMaps.
# -----------------------------------------------------------------------------

operator:
  # Enable vulnerability scanner (VulnerabilityReport CRs)
  vulnerabilityScannerEnabled: true

trivyOperator:
  # Keep compressed logs for BigQuery / log pipeline experiments
  scanJobCompressLogs: true

trivy:
  # Show all CVEs including those without a vendor fix
  ignoreUnfixed: false
  # TODO: pin trivy.image.tag to match chart-tested Trivy (see chart default values)

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "TODO@PROJECT_ID.iam.gserviceaccount.com"

# TODO: optional — pin operator Deployment to a node pool (top-level key in this chart)
# nodeSelector:
#   cloud.google.com/gke-nodepool: hardened-pool
