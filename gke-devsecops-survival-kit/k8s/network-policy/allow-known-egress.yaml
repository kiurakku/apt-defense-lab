# Allows only HTTPS and DNS; everything else (including C&C) is blocked when
# combined with default-deny NetworkPolicy semantics for the same pods.
# Port 4444 (C&C) is not in this list — blocked by deny-all above.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-known-egress-only
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
