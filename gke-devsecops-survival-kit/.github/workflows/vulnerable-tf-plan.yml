# VULNERABLE — INTENTIONAL MISCONFIGURATION FOR EDUCATIONAL USE ONLY
# =============================================================================
# This workflow is INTENTIONALLY VULNERABLE for educational purposes.
# Trigger: pull_request (including from forks)
# Problem: WIF subject is not scoped to refs/heads/main,
#          so a forked PR can obtain a GCP access token during `terraform plan`.
# The malicious step below simulates token exfiltration.
# =============================================================================
name: vulnerable-tf-plan

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: set workload_identity_provider and service_account to your values
      - name: Authenticate to Google Cloud (WIF — NOT scoped to main ref)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }} # projects/.../locations/.../workloadIdentityPools/.../providers/...
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }} # cicd-sa@PROJECT_ID.iam.gserviceaccount.com
          # VULNERABLE: missing attribute_condition — any ref (including fork PR merge refs) may authenticate

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false

