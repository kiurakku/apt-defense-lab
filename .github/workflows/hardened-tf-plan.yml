# ✅ HARDENED VERSION
# Changes vs vulnerable:
# 1. Trigger: push to main only (not PRs from forks)
# 2. WIF attribute_condition includes assertion.ref == 'refs/heads/main'
#    (must be applied in Terraform: google_iam_workload_identity_pool_provider.github_provider)
# 3. Explicit branch protection assumed on main
name: hardened-tf-plan

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      # Required Terraform variables (see terraform/variables.tf). Repo identity matches OIDC / WIF mapping.
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_github_org: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      TF_VAR_tf_state_bucket_name: ${{ secrets.TF_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (prod WIF — strict binding in Terraform)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.CICD_PLAN_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          if [ -z "${TF_VAR_project_id}" ]; then
            echo "Add repository secret GCP_PROJECT_ID (your GCP project id, same as terraform.tfvars project_id)."
            exit 1
          fi
          terraform plan -input=false
