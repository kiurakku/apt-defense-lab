options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s

substitutions:
  _DATASET: trivy_logs
  _LIMIT: "1000"

steps:
  - id: parse trivy logs
    name: python:3.11-slim
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --no-cache-dir -r scripts/requirements.txt
        python scripts/parse_trivy_bq.py \
          --from-sink \
          --project "${PROJECT_ID}" \
          --dataset "${_DATASET}" \
          --limit "${_LIMIT}"
