# Single deploy path: Artifact Registry image (docker/ci-deploy) with gcloud + kubectl + helm + GKE auth plugin.
# Infra (Terraform: GKE, BQ, sinks, IAM) is applied separately — this pipeline only deploys workloads + NetworkPolicy.
#
# Prerequisite: build/push the image at least once:
#   gcloud builds submit --config=cloudbuild/cloudbuild.yaml .
# Default _IMAGE_TAG=latest is pushed by cloudbuild.yaml alongside SHORT_SHA.
#
# Trigger: set service account to terraform output cloudbuild_sa_email (or cloudbuild_sa_resource_name per GCP docs).
# Substitutions: _TRIVY_GSA_EMAIL (terraform output trivy_sa_email), _REGION, _CLUSTER_LOCATION, _CLUSTER_NAME.

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s

substitutions:
  _REGION: us-central1
  _CLUSTER_LOCATION: us-central1-b
  _CLUSTER_NAME: lab-cluster
  _REPO: lab-ci
  _IMAGE: ci-deploy
  _IMAGE_TAG: latest
  _TRIVY_GSA_EMAIL: REPLACE_WITH_TRIVY_SA_EMAIL

steps:
  - id: gke-deploy
    name: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_IMAGE_TAG}
    env:
      - USE_GKE_GCLOUD_AUTH_PLUGIN=True
    entrypoint: bash
    args:
      - -ceu
      - |
        set -euo pipefail
        if [[ "${_TRIVY_GSA_EMAIL}" == REPLACE_WITH_TRIVY_SA_EMAIL || -z "${_TRIVY_GSA_EMAIL}" ]]; then
          echo "Set substitution _TRIVY_GSA_EMAIL to terraform output trivy_sa_email"
          exit 1
        fi
        gcloud container clusters get-credentials "${_CLUSTER_NAME}" \
          --location "${_CLUSTER_LOCATION}" \
          --project "${PROJECT_ID}"

        helm repo add aqua https://aquasecurity.github.io/helm-charts/
        helm repo update
        helm upgrade --install trivy-operator aqua/trivy-operator \
          --namespace trivy-system \
          --create-namespace \
          --version 0.32.1 \
          -f k8s/trivy-operator/values.yaml \
          --set-string 'serviceAccount.annotations.iam\.gke\.io/gcp-service-account'="${_TRIVY_GSA_EMAIL}"

        bash scripts/configure_trivy_log_compression.sh

        helm repo add falcosecurity https://falcosecurity.github.io/charts
        helm repo update
        helm upgrade --install falco falcosecurity/falco \
          --namespace falco \
          --create-namespace \
          --version 8.0.1 \
          -f k8s/falco/values.yaml

        bash scripts/apply_network_policies.sh
